include: package:flutter_lints/flutter.yaml

# ── Strict linting rules for production-quality crypto code ──────────────

linter:
  rules:
    # ── Error prevention ────────────────────────────────────────────────
    - always_use_package_imports          # Prefer package: imports
    - avoid_dynamic_calls                 # No dynamic method calls
    - avoid_empty_else                    # No empty else blocks
    - avoid_print                         # No print() in production
    - avoid_relative_lib_imports          # Use package: for lib/ imports
    - avoid_slow_async_io                 # No slow async I/O
    - avoid_type_to_string                # No .toString() on types
    - avoid_types_as_parameter_names      # No type names as param names
    - cancel_subscriptions                # Cancel stream subscriptions
    - close_sinks                         # Close stream sinks
    - comment_references                  # Only in doc comments
    - control_flow_in_finally             # No control flow in finally
    - discarded_futures                   # Don't discard futures
    - empty_statements                    # No empty statements
    - exhaustive_cases                    # Switch on enums must be exhaustive
    - hash_and_equals                     # Override hashCode with ==
    - literal_only_boolean_expressions    # No non-boolean in conditions
    - no_adjacent_strings_in_list         # No implicit string concat
    - no_duplicate_case_values            # No duplicate switch cases
    - no_logic_error                      # No logical errors
    - no_self_assignments                 # No self-assignments
    - prefer_const_constructors           # Prefer const constructors
    - prefer_const_declarations           # Prefer const declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals                 # Prefer final locals
    - prefer_void_to_null                 # Don't use Null type
    - throw_in_finally                    # No throw in finally
    - unnecessary_statements              # No unnecessary statements
    - unsafe_html                         # No unsafe HTML
    - use_build_context_synchronously     # Safe BuildContext usage
    - use_key_in_widget_constructors      # Key param in widgets

    # ── Style ───────────────────────────────────────────────────────────
    - always_declare_return_types         # Always declare return types
    - annotate_overrides                  # @override on overrides
    - avoid_annotating_with_dynamic       # No @dynamic annotations
    - avoid_bool_literals_in_conditional_expressions
    - avoid_catches_without_on_clauses    # Catch with on clause
    - avoid_catching_errors               # Don't catch Error types
    - avoid_classes_with_only_static_members
    - avoid_double_and_int_checks         # No is double/int checks
    - avoid_equals_and_hash_code_on_mutable_classes
    - avoid_escaping_inner_quotes         # Consistent quoting
    - avoid_field_initializers_in_const_classes
    - avoid_final_parameters              # Allow final params
    - avoid_function_literals_in_foreach_calls
    - avoid_implementing_value_types      # Don't implement value types
    - avoid_init_to_null                  # No = null initializers
    - avoid_js_rounded_ints               # No JS-rounded ints
    - avoid_multiple_declarations_per_line
    - avoid_null_checks_in_equality_operators
    - avoid_positional_boolean_parameters # Named boolean params
    - avoid_private_typedef_functions     # No private typedefs
    - avoid_redundant_argument_values     # No redundant args
    - avoid_renaming_method_parameters    # Don't rename params
    - avoid_return_types_on_setters       # No return type on setters
    - avoid_returning_null_for_future     # No null futures
    - avoid_returning_null_for_void       # No null for void
    - avoid_returning_this                # No returning this
    - avoid_setters_without_getters       # Pair setters with getters
    - avoid_shadowing_type_parameters     # No shadowing type params
    - avoid_single_cascade_in_expression_statements
    - avoid_unnecessary_containers        # No unnecessary containers
    - avoid_unused_constructor_parameters # No unused ctor params
    - avoid_void_async                    # No void async
    - await_only_futures                  # Only await futures
    - camel_case_extensions               # camelCase extensions
    - camel_case_types                    # CamelCase types
    - constant_identifier_names           # CONSTANT_NAMES
    - curly_braces_in_flow_control_structures
    - depend_on_referenced_packages       # Explicit deps
    - deprecated_consistency              # Consistent deprecation
    - directives_ordering                 # Order imports
    - do_not_use_environment              # No environment decls
    - empty_catches                       # No empty catch blocks
    - empty_constructor_bodies            # No empty ctor bodies
    - eol_at_end_of_file                  # EOL at EOF
    - file_names                          # lowercase file names
    - flutter_style_todos                 # TODO format
    - implicit_call_tearoffs              # No implicit tearoffs
    - join_return_with_assignment         # Join return+assignment
    - leading_newlines_in_multiline_strings
    - library_annotations                 # @JS annotations
    - library_names                       # lowercase lib names
    - library_prefixes                    # lowercase prefixes
    - matching_super_parameters           # Match super params
    - missing_whitespace_between_adjacent_strings
    - no_default_cases                    # No default cases
    - no_leading_underscores_for_library_prefixes
    - no_leading_underscores_for_local_identifiers
    - no_literal_bool_comparisons         # No == true/false
    - no_runtimeType_toString             # No runtimeType.toString()
    - non_constant_identifier_names       # camelCase identifiers
    - null_check_on_nullable_type_parameter
    - null_closures                       # No null closures
    - omit_local_variable_types           # Omit local var types
    - one_member_abstracts                # No single-member abstracts
    - only_throw_errors                   # Only throw Error types
    - overridden_fields                   # @override on fields
    - package_api_docs                    # Document public API
    - package_prefixed_library_names      # Package-prefixed libs
    - parameter_assignments               # No param reassignment
    - prefer_adjacent_string_concatenation
    - prefer_asserts_in_initializer_lists
    - prefer_asserts_with_message         # Asserts with messages
    - prefer_collection_literals          # Collection literals
    - prefer_conditional_assignment       # ??= over if-null
    - prefer_constructors_over_static_methods
    - prefer_contains                     # .contains over indexOf
    - prefer_equal_for_default_values     # = over : for defaults
    - prefer_expression_function_bodies   # => for simple bodies
    - prefer_final_in_for_each            # final in for-each
    - prefer_final_parameters             # final params
    - prefer_for_elements_to_map_fromIterable
    - prefer_foreach                      # .forEach over for-in
    - prefer_function_declarations_over_variables
    - prefer_generic_function_type_aliases
    - prefer_if_elements_to_conditional_expressions
    - prefer_if_null_operators            # ?? over null checks
    - prefer_initializing_formals         # this.x in ctors
    - prefer_inlined_adds                 # Inlined adds
    - prefer_int_literals                 # int literals
    - prefer_interpolation_to_compose_strings
    - prefer_is_empty                     # .isEmpty over .length == 0
    - prefer_is_not_empty                 # .isNotEmpty over .length > 0
    - prefer_is_not_operator              # is! over !(is)
    - prefer_iterable_whereType           # .whereType<T>()
    - prefer_mixin                        # mixin over class
    - prefer_null_aware_method_calls      # ?.method()
    - prefer_null_aware_operators         # ?? over null checks
    - prefer_relative_imports             # Relative imports in lib
    - prefer_single_quotes                # Single quotes
    - prefer_spread_collections           # Spread collections
    - prefer_typing_uninitialized_variables
    - provide_deprecation_message         # Deprecation messages
    - public_member_api_docs              # Document public API
    - recursive_getters                   # No recursive getters
    - require_trailing_commas             # Trailing commas
    - secure_pubspec_urls                 # https in pubspec
    - sized_box_for_whitespace            # SizedBox for whitespace
    - slash_for_doc_comments              # /// for doc comments
    - sort_child_properties_last          # Sort child props last
    - sort_constructors_first             # Constructors first
    - sort_unnamed_constructors_first     # Unnamed ctors first
    - test_types_in_equals                # Test types in ==
    - tighten_type_of_initializing_formals
    - type_annotate_public_apis           # Type annotate public API
    - type_init_formals                   # Type init formals
    - unawaited_futures                   # unawaited futures
    - unnecessary_await_in_return         # No unnecessary await
    - unnecessary_brace_in_string_interps # No unnecessary braces
    - unnecessary_const                   # No unnecessary const
    - unnecessary_constructor_name        # No unnecessary ctor names
    - unnecessary_final                   # No unnecessary final
    - unnecessary_getters_setters         # No unnecessary get/set
    - unnecessary_lambdas                 # No unnecessary lambdas
    - unnecessary_late                    # No unnecessary late
    - unnecessary_new                     # No unnecessary new
    - unnecessary_null_aware_assignments  # No unnecessary ??=
    - unnecessary_null_checks             # No unnecessary null checks
    - unnecessary_null_in_if_null_operators
    - unnecessary_nullable_for_final_variable_declarations
    - unnecessary_overrides               # No unnecessary overrides
    - unnecessary_parenthesis             # No unnecessary parens
    - unnecessary_raw_strings             # No unnecessary raw strings
    - unnecessary_string_escapes          # No unnecessary escapes
    - unnecessary_string_interpolations   # No unnecessary ${}
    - unnecessary_this                    # No unnecessary this
    - unnecessary_to_list_in_spreads      # No unnecessary .toList()
    - unrelated_type_equality_checks      # No unrelated type checks
    - unsafe_variance                     # No unsafe variance
    - use_colored_box                     # ColoredBox over Container
    - use_decorated_box                   # DecoratedBox over Container
    - use_enums                           # Use enums
    - use_full_hex_values_for_flutter_colors
    - use_function_type_syntax_for_parameters
    - use_if_null_to_convert_nulls_to_bools
    - use_is_even_rather_than_modulo      # isEven over % 2
    - use_late_for_private_fields_and_variables
    - use_named_constants                 # Named constants
    - use_raw_strings                     # Raw strings for regex
    - use_rethrow_when_possible           # rethrow over throw e
    - use_setters_to_change_properties    # Setters for mutation
    - use_string_buffers                  # StringBuffer for concat
    - use_string_in_part_of_directives    # String in part of
    - use_super_parameters                # super. params
    - use_test_throws_matchers            # throwsA matchers
    - use_to_and_as_if_applicable         # to/As if applicable

    # ── Performance ─────────────────────────────────────────────────────
    - avoid_unnecessary_setstate          # No unnecessary setState
    - avoid_unstable_finalized_variables  # No unstable final vars

    # ── Pub ─────────────────────────────────────────────────────────────
    - sort_pub_dependencies               # Sort pub deps

# ── Analyzer configuration ──────────────────────────────────────────────

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - ".dart_tool/**"

  errors:
    # Treat all lint rules as errors
    missing_return: error
    dead_code: error
    always_declare_return_types: error
    avoid_dynamic_calls: warning
    avoid_print: warning
    avoid_relative_lib_imports: warning
    public_member_api_docs: warning
    unawaited_futures: error

  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true